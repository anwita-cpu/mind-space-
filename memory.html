<!DOCTYPE html>
<html>
<head>
  <title>Mindspace — Memory Jar</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0a0f;
      color: white;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    nav {
      background-color: rgba(26,26,46,0.95);
      backdrop-filter: blur(6px);
      padding: 15px;
      display: flex;
      gap: 20px;
      justify-content: center;
      position: relative;
      z-index: 10;
    }
    nav a { color: white; text-decoration: none; font-size: 16px; opacity: 0.8; }
    nav a:hover { opacity: 1; }

    #bubbleCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .empty-state {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0.3;
      font-size: 14px;
      line-height: 2;
      z-index: 1;
      pointer-events: none;
    }

    #addBtn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 56px;
      height: 56px;
      background: #7F77DD;
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 28px;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 4px 20px rgba(127,119,221,0.4);
      transition: transform .2s, opacity .2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #addBtn:hover { transform: scale(1.1); opacity: 0.9; }

    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 30;
      justify-content: center;
      align-items: center;
    }
    .overlay.show { display: flex; }

    .modal {
      background: #1a1a2e;
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px;
      width: 360px;
      max-width: 90%;
    }
    .modal h3 { font-size: 18px; margin-bottom: 6px; }
    .modal p { font-size: 13px; opacity: 0.5; margin-bottom: 20px; }

    .modal textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .modal textarea:focus { border-color: rgba(127,119,221,0.5); }
    .modal textarea::placeholder { color: rgba(255,255,255,0.25); }

    .photo-upload {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 0.5px dashed rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      opacity: 0.6;
      margin-bottom: 12px;
      transition: background .2s;
    }
    .photo-upload:hover { background: rgba(255,255,255,0.08); }

    #photoPreview {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 12px;
      display: none;
      max-height: 160px;
      object-fit: cover;
    }

    #fileInput { display: none; }

    .modal-btns { display: flex; gap: 10px; }
    .btn-cancel {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.1);
      color: white;
      border-radius: 99px;
      padding: 11px;
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
    }
    .btn-save {
      flex: 2;
      background: #7F77DD;
      border: none;
      color: white;
      border-radius: 99px;
      padding: 11px;
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-save:hover { opacity: 0.88; }
    .btn-save:disabled { opacity: 0.35; cursor: default; }

    #memoryPopup {
      background: #1a1a2e;
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 24px;
      width: 340px;
      max-width: 90%;
      text-align: center;
    }
    #memoryPopup img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 14px;
      max-height: 200px;
      object-fit: cover;
    }
    #memoryPopup p {
      font-size: 15px;
      line-height: 1.7;
      opacity: 0.9;
      margin-bottom: 18px;
    }
    #memoryDate {
      font-size: 12px;
      opacity: 0.35;
      margin-bottom: 18px;
    }
    .popup-btns { display: flex; gap: 10px; }
    .btn-delete {
      flex: 1;
      background: rgba(240,149,149,0.1);
      border: 0.5px solid rgba(240,149,149,0.3);
      color: rgba(240,149,149,0.8);
      border-radius: 99px;
      padding: 10px;
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
    }
    .btn-close {
      flex: 2;
      background: rgba(255,255,255,0.08);
      border: none;
      color: white;
      border-radius: 99px;
      padding: 10px;
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html">Home</a>
  <a href="sage.html">Sage</a>
  <a href="tracker.html">Mood</a>
  <a href="toolkit.html">Coping</a>
  <a href="vent.html">Vent</a>
  <a href="community.html">Community</a>
  <a href="memory.html">Memory</a>
</nav>

<canvas id="bubbleCanvas"></canvas>

<div class="empty-state" id="emptyState">
  🫙<br>Your memory jar is empty<br>Tap + to add your first happy memory
</div>

<button id="addBtn" onclick="openAddModal()">+</button>

<div class="overlay" id="addOverlay">
  <div class="modal">
    <h3>🫧 New memory</h3>
    <p>What made you smile? Save it here.</p>
    <textarea id="memoryText" rows="3" maxlength="200" placeholder="Describe the memory..."></textarea>
    <img id="photoPreview" src="" alt="preview">
    <div class="photo-upload" onclick="document.getElementById('fileInput').click()">
      📷 Add a photo (optional)
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="handlePhoto(event)">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveMemory()">Save memory</button>
    </div>
  </div>
</div>

<div class="overlay" id="viewOverlay">
  <div id="memoryPopup">
    <img id="popupImg" src="" alt="">
    <p id="popupText"></p>
    <p id="memoryDate"></p>
    <div class="popup-btns">
      <button class="btn-delete" onclick="deleteMemory()">🗑 delete</button>
      <button class="btn-close" onclick="closeViewModal()">close</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCdM39QjJ0m3f9wob5qqacgHpnihMIfsW0",
    authDomain: "mindspace-18083.firebaseapp.com",
    projectId: "mindspace-18083",
    storageBucket: "mindspace-18083.firebasestorage.app",
    messagingSenderId: "1091007788631",
    appId: "1:1091007788631:web:57a22d804d3787b5685512"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Give each device/browser a unique anonymous ID, stored locally forever
  function getUserId() {
    var id = localStorage.getItem('ms_user_id');
    if (!id) {
      id = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 12);
      localStorage.setItem('ms_user_id', id);
    }
    return id;
  }
  var userId = getUserId();

  var memories = [];
  var bubbles = [];
  var selectedId = null;
  var compressedPhoto = null;

  var canvas = document.getElementById('bubbleCanvas');
  var ctx = canvas.getContext('2d');

  var colors = [
    ['#C084FC','#A855F7'],
    ['#F9A8D4','#EC4899'],
    ['#60C8F5','#22A8E8'],
    ['#86EFAC','#4ADE80'],
    ['#FDE68A','#FCD34D'],
    ['#FCA5A5','#F87171'],
    ['#A5F3FC','#22D3EE'],
    ['#D9F99D','#86EFAC'],
  ];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function makeBubble(memory, index) {
    var r = 55 + Math.min(memory.text.length * 0.3, 30);
    var col = colors[index % colors.length];
    return {
      id: memory.id,
      x: Math.random() * (canvas.width - r*2) + r,
      y: Math.random() * (canvas.height - r*2) + r,
      r: r,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      col1: col[0],
      col2: col[1],
      text: memory.text,
      photo: memory.photo || null,
      shimmer: Math.random() * Math.PI * 2,
      scale: 1,
      targetScale: 1,
    };
  }

  function drawBubble(b) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.scale(b.scale, b.scale);

    var grad = ctx.createRadialGradient(-b.r*0.3, -b.r*0.3, b.r*0.1, 0, 0, b.r);
    grad.addColorStop(0, b.col1 + 'cc');
    grad.addColorStop(1, b.col2 + '88');
    ctx.beginPath();
    ctx.arc(0, 0, b.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    var shimGrad = ctx.createRadialGradient(-b.r*0.4, -b.r*0.4, 0, -b.r*0.4, -b.r*0.4, b.r*0.6);
    shimGrad.addColorStop(0, 'rgba(255,255,255,0.35)');
    shimGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(0, 0, b.r, 0, Math.PI * 2);
    ctx.fillStyle = shimGrad;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, 0, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (b.photo) {
      ctx.font = '22px serif';
      ctx.fillText('📷', 0, -10);
      ctx.font = '500 10px Poppins, sans-serif';
      var words = b.text.split(' ');
      var line = '';
      var lines = [];
      words.forEach(function(w) {
        var test = line + w + ' ';
        if (ctx.measureText(test).width > b.r * 1.4 && line) {
          lines.push(line.trim());
          line = w + ' ';
        } else { line = test; }
      });
      if (line) lines.push(line.trim());
      lines = lines.slice(0, 2);
      lines.forEach(function(l, i) {
        ctx.fillText(l, 0, 14 + i * 14);
      });
    } else {
      ctx.font = '500 11px Poppins, sans-serif';
      var words = b.text.split(' ');
      var line = '';
      var lines = [];
      words.forEach(function(w) {
        var test = line + w + ' ';
        if (ctx.measureText(test).width > b.r * 1.5 && line) {
          lines.push(line.trim());
          line = w + ' ';
        } else { line = test; }
      });
      if (line) lines.push(line.trim());
      lines = lines.slice(0, 3);
      var startY = -(lines.length - 1) * 8;
      lines.forEach(function(l, i) {
        ctx.fillText(l, 0, startY + i * 16);
      });
    }

    ctx.restore();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    bubbles.forEach(function(b) {
      b.shimmer += 0.02;
      b.x += b.vx;
      b.y += b.vy;
      if (b.x - b.r < 0 || b.x + b.r > canvas.width) b.vx *= -1;
      if (b.y - b.r < 0 || b.y + b.r > canvas.height) b.vy *= -1;
      b.scale += (b.targetScale - b.scale) * 0.1;
      drawBubble(b);
    });
    requestAnimationFrame(animate);
  }

  animate();

  async function loadMemories() {
    // ONLY load memories belonging to this user's device
    var q = query(
      collection(db, 'memories'),
      where('userId', '==', userId),
      orderBy('createdAt', 'desc')
    );
    var snap = await getDocs(q);
    memories = [];
    bubbles = [];
    snap.forEach(function(d) {
      var data = d.data();
      memories.push({ id: d.id, text: data.text, photo: data.photo || null, createdAt: data.createdAt });
    });
    document.getElementById('emptyState').style.display = memories.length === 0 ? 'block' : 'none';
    memories.forEach(function(m, i) { bubbles.push(makeBubble(m, i)); });
  }

  loadMemories();

  canvas.addEventListener('click', function(e) {
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    for (var i = bubbles.length - 1; i >= 0; i--) {
      var b = bubbles[i];
      var dx = mx - b.x, dy = my - b.y;
      if (Math.sqrt(dx*dx + dy*dy) <= b.r) {
        openViewModal(b);
        return;
      }
    }
  });

  canvas.addEventListener('mousemove', function(e) {
    var rect = canvas.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    var hit = false;
    bubbles.forEach(function(b) {
      var dx = mx - b.x, dy = my - b.y;
      if (Math.sqrt(dx*dx + dy*dy) <= b.r) {
        b.targetScale = 1.1;
        canvas.style.cursor = 'pointer';
        hit = true;
      } else {
        b.targetScale = 1;
      }
    });
    if (!hit) canvas.style.cursor = 'default';
  });

  window.openAddModal = function() {
    document.getElementById('addOverlay').classList.add('show');
  };

  window.closeAddModal = function() {
    document.getElementById('addOverlay').classList.remove('show');
    document.getElementById('memoryText').value = '';
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('photoPreview').src = '';
    compressedPhoto = null;
  };

  window.handlePhoto = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        var maxSize = 800;
        var w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        var c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        compressedPhoto = c.toDataURL('image/jpeg', 0.7);
        document.getElementById('photoPreview').src = compressedPhoto;
        document.getElementById('photoPreview').style.display = 'block';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  window.saveMemory = async function() {
    var text = document.getElementById('memoryText').value.trim();
    if (!text) return;
    var btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';
    try {
      await addDoc(collection(db, 'memories'), {
        text: text,
        photo: compressedPhoto || null,
        userId: userId,
        createdAt: serverTimestamp()
      });
      closeAddModal();
      await loadMemories();
    } catch(e) {
      alert('Could not save. Try again.');
    }
    btn.disabled = false;
    btn.textContent = 'Save memory';
  };

  function openViewModal(b) {
    selectedId = b.id;
    var popup = document.getElementById('memoryPopup');
    var img = document.getElementById('popupImg');
    if (b.photo) {
      img.src = b.photo;
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }
    document.getElementById('popupText').textContent = b.text;
    var mem = memories.find(function(m) { return m.id === b.id; });
    if (mem && mem.createdAt) {
      var d = mem.createdAt.toDate();
      document.getElementById('memoryDate').textContent = d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
    } else {
      document.getElementById('memoryDate').textContent = '';
    }
    document.getElementById('viewOverlay').classList.add('show');
  }

  window.closeViewModal = function() {
    document.getElementById('viewOverlay').classList.remove('show');
    selectedId = null;
  };

  window.deleteMemory = async function() {
    if (!selectedId) return;
    try {
      await deleteDoc(doc(db, 'memories', selectedId));
      closeViewModal();
      await loadMemories();
    } catch(e) {
      alert('Could not delete. Try again.');
    }
  };

  document.getElementById('addOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeAddModal();
  });
  document.getElementById('viewOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeViewModal();
  });
</script>

</body>
</html>
