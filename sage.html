<!DOCTYPE html>
  <html>
      <head>
         <title> Sage- Mindspace </title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <style>

        body{
        background-color: black;
        color : white;
        font-family : 'Poppins', sans-serif;
        padding : 0px;
        margin: 0px;
        }

        nav{
      background-color: #1a1a2e;
      padding: 15px;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

      nav a{
      color: white;
      text-decoration: none;
      font-size: 16px;

      }

     h1{
       text-align :center;
       font-size: 36px;

     }
      p{
        text-align: center;

      }

      
 </style>

      <body>

      <nav>
      <a href="index.html">Mindspace</a>
       </nav>

        <h1>💬 Sage</h1>
        <p>Need a safe space to talk? Sage is here to listen</p>

        <div id="chatbox" style="width:500px; height:400px; margin:20px auto; background-color:#1a1a2e; border-radius:15px; padding:20px; overflow-y:scroll; text-align:left;">
  <p style="background-color:#7F77DD; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%;">
    Hey, I'm Sage 💜 What's on your mind?
  </p>
</div>

    
      <div style="width:500px; margin:10px auto; display:flex; gap:10px;">
  <input id="userInput" type="text" placeholder="Type your message..." style="flex:1; padding:12px; border-radius:30px; border:none; font-size:16px; font-family:'Poppins', sans-serif;">
  <button id="sendBtn" style="background-color:#7F77DD; border:none; color:white; padding:12px 25px; border-radius:30px; cursor:pointer; font-size:16px; font-family:'Poppins', sans-serif;">

     Send
  </button>
</div>

      <script>
  var API_KEY = 'AQ.Ab8RN6J-Sz5ITebnZ89hQ98_cGYXKDTWnWVeEonIUU5eigOeQA';

  document.getElementById('sendBtn').addEventListener('click', function() {
    var input = document.getElementById('userInput');
    var chatbox = document.getElementById('chatbox');

    if (input.value === '') {
      return;
    }

    var userMsg = document.createElement('p');
    userMsg.textContent = input.value;
    userMsg.style.cssText = 'background-color:#2a2a4a; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%; float:right; clear:both;';
    chatbox.appendChild(userMsg);

    var userText = input.value;
    input.value = '';

    fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + API_KEY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: {
          parts: [{ text: "You are Sage, a kind and supportive friend in the MindSpace app. You talk to teens who are going through tough times. You listen, you are warm, you never judge. You speak casually like a friend, not a therapist. You use simple language. Keep responses short, 2-3 sentences max. If someone seems like they are in danger or crisis, gently encourage them to talk to a trusted adult or call a helpline. Never give medical advice. Always remind them that their feelings are valid." }]
        },
        contents: [
          { role: "user", parts: [{ text: userText }] }
        ]
      })
    })
    .then(function(response) { return response.json(); })
    .then(function(data) {
      var sageMsg = document.createElement('p');
      sageMsg.textContent = data.candidates[0].content.parts[0].text;
      sageMsg.style.cssText = 'background-color:#7F77DD; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%; clear:both;';
      chatbox.appendChild(sageMsg);
      chatbox.scrollTop = chatbox.scrollHeight;




    });
  });
</script>
