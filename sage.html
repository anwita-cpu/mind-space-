<!DOCTYPE html>
  <html>
      <head>
         <title> Sage- Mindspace </title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
        <style>

        body{
        background-color: black;
        color : white;
        font-family : 'Poppins', sans-serif;
        padding : 0px;
        margin: 0px;
        }

        nav{
      background-color: #1a1a2e;
      padding: 15px;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

      nav a{
      color: white;
      text-decoration: none;
      font-size: 16px;

      }

     h1{
       text-align :center;
       font-size: 36px;

     }
      p{
        text-align: center;

      }

      
 </style>

      <body>

      <nav>
      <a href="index.html">Mindspace</a>
       </nav>

        <h1>💬 Sage</h1>
        <p>Need a safe space to talk? Sage is here to listen</p>

        <div id="chatbox" style="width:500px; height:400px; margin:20px auto; background-color:#1a1a2e; border-radius:15px; padding:20px; overflow-y:scroll; text-align:left;">
  <p style="background-color:#7F77DD; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%;">
    Hey, I'm Sage 💜 What's on your mind?
  </p>
</div>

    
      <div style="width:500px; margin:10px auto; display:flex; gap:10px;">
  <input id="userInput" type="text" placeholder="Type your message..." style="flex:1; padding:12px; border-radius:30px; border:none; font-size:16px; font-family:'Poppins', sans-serif;">
  <button id="sendBtn" style="background-color:#7F77DD; border:none; color:white; padding:12px 25px; border-radius:30px; cursor:pointer; font-size:16px; font-family:'Poppins', sans-serif;">

     Send
  </button>
</div>

   <script>
   const API_KEY = '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';
  const API_URL = 'https://api.groq.com/openai/v1/chat/completions';
   const MODEL = 'llama3-8b-8192';

  var conversationHistory = [];

  document.getElementById('sendBtn').addEventListener('click', function() {
    var input = document.getElementById('userInput');
    var chatbox = document.getElementById('chatbox');

    if (input.value === '') {
      return;
    }

    var userMsg = document.createElement('p');
    userMsg.textContent = input.value;
    userMsg.style.cssText = 'background-color:#2a2a4a; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%; float:right; clear:both;';
    chatbox.appendChild(userMsg);

    var userText = input.value;
    input.value = '';

    conversationHistory.push({ role: "user", parts: [{ text: userText }] });

  fetch(API_URL, {
  method: 'POST',
  headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY },
  body: JSON.stringify({
    model: MODEL,
    messages: [
      { role: 'system', content: 'You are Sage, a kind and supportive friend in the MindSpace app. You talk to teens who are going through tough times. You listen, you are warm, you are never judgemental.' },
      ...conversationHistory.map(function(m) { return { role: m.role === 'model' ? 'assistant' : 'user', content: m.parts[0].text }; })
    ],
    max_tokens: 500
  })
}).then(function(response) {
  return response.json().then(function(data) {
    return { ok: response.ok, status: response.status, data: data };
  });
}).then(function(result) {
  var sageMsg = document.createElement('p');
  if (!result.ok) {
    sageMsg.textContent = '⚠️ API error (' + result.status + '): ' + (result.data.error && result.data.error.message ? result.data.error.message : 'request failed');
  } else if (result.data.choices && result.data.choices[0]) {
    var replyText = result.data.choices[0].message.content;
    sageMsg.textContent = replyText;
    conversationHistory.push({ role: "model", parts: [{ text: replyText }] });
  } else {
    sageMsg.textContent = '⚠️ No response received from Sage.';
  }
  sageMsg.style.cssText = 'background-color:#7F77DD; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%; clear:both;';
  chatbox.appendChild(sageMsg);
  chatbox.scrollTop = chatbox.scrollHeight;
}).catch(function(err) {
  var sageMsg = document.createElement('p');
  sageMsg.textContent = '⚠️ Network error: ' + err.message;
  sageMsg.style.cssText = 'background-color:#7F77DD; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%; clear:both;';
  chatbox.appendChild(sageMsg);
  chatbox.scrollTop = chatbox.scrollHeight;
});


</script>

  </body>
</html>
