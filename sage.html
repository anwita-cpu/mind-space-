<!DOCTYPE html>
<html>
<head>
<title> Sage- Mindspace </title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
background-color: black;
color : white;
font-family : 'Poppins', sans-serif;
padding : 0px;
margin: 0px;
}
nav{
background-color: #1a1a2e;
padding: 15px;
display: flex;
gap: 20px;
justify-content: center;
}
nav a{
color: white;
text-decoration: none;
font-size: 16px;
}
h1{
text-align :center;
font-size: 36px;
}
p{
text-align: center;
}
</style>
</head>
<body>
<nav>
  <a href="index.html">Mindspace</a>
</nav>

<h1>💬 Sage</h1>
<p>Need a safe space to talk? Sage is here to listen</p>

<div id="chatbox" style="width:500px; height:400px; margin:20px auto; background-color:#1a1a2e; border-radius:15px; padding:20px; overflow-y:scroll; text-align:left;">
  <p style="background-color:#7F77DD; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%;">
    Hey, I'm Sage 💜 What's on your mind?
  </p>
</div>

<div style="width:500px; margin:0 auto; display:flex; gap:10px;">
  <input id="userInput" type="text" placeholder="Type here..." style="flex:1; padding:10px; border-radius:10px; border:none; font-family:'Poppins',sans-serif; font-size:14px;" onkeydown="if(event.key==='Enter') sendMessage()"/>
  <button onclick="sendMessage()" style="padding:10px 20px; background-color:#7F77DD; color:white; border:none; border-radius:10px; cursor:pointer; font-family:'Poppins',sans-serif;">Send</button>
</div>

<script>
var conversationHistory = [];

function sendMessage() {
  var input = document.getElementById('userInput');
  var chatbox = document.getElementById('chatbox');
  var userText = input.value.trim();
  if (!userText) return;

  var userMsg = document.createElement('p');
  userMsg.textContent = userText;
  userMsg.style.cssText = 'background-color:#444; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%; clear:both; float:right;';
  chatbox.appendChild(userMsg);
  input.value = '';
  chatbox.scrollTop = chatbox.scrollHeight;

  conversationHistory.push({ role: 'user', content: userText });

  fetch('https://sage-proxy.anwitaghosh20.workers.dev', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'llama3-8b-8192',
      messages: [
        { role: 'system', content: 'You are Sage, a warm and supportive mental health companion for teenagers. You listen carefully, are never judgemental, and respond with empathy and care.' },
        ...conversationHistory
      ],
      max_tokens: 500
    })
  })
  .then(function(response) { return response.json(); })
  .then(function(data) {
    var sageMsg = document.createElement('p');
    if (data.choices && data.choices[0]) {
      var replyText = data.choices[0].message.content;
      sageMsg.textContent = replyText;
      conversationHistory.push({ role: 'assistant', content: replyText });
    } else {
      sageMsg.textContent = '⚠️ Sage could not respond. Please try again.';
    }
    sageMsg.style.cssText = 'background-color:#7F77DD; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%; clear:both;';
    chatbox.appendChild(sageMsg);
    chatbox.scrollTop = chatbox.scrollHeight;
  })
  .catch(function(err) {
    var sageMsg = document.createElement('p');
    sageMsg.textContent = '⚠️ Network error: ' + err.message;
    sageMsg.style.cssText = 'background-color:#7F77DD; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%; clear:both;';
    chatbox.appendChild(sageMsg);
    chatbox.scrollTop = chatbox.scrollHeight;
  });
}
</script>

</body>
</html>
