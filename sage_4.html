<!DOCTYPE html>
<html>
<head>
<title> Sage- Mindspace </title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
background-color: black;
color : white;
font-family : 'Poppins', sans-serif;
padding : 0px;
margin: 0px;
}
nav{
background-color: #1a1a2e;
padding: 15px;
display: flex;
gap: 20px;
justify-content: center;
}
nav a{
color: white;
text-decoration: none;
font-size: 16px;
}
h1{
text-align :center;
font-size: 36px;
}
p{
text-align: center;
}
</style>
</head>
<body>
<nav>
  <a href="index.html">Mindspace</a>
</nav>

<h1>💬 Sage</h1>
<p>Need a safe space to talk? Sage is here to listen</p>

<div id="chatbox" style="width:500px; height:400px; margin:20px auto; background-color:#1a1a2e; border-radius:15px; padding:20px; overflow-y:scroll; text-align:left;">
  <p style="background-color:#7F77DD; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%;">
    Hey, I'm Sage 💜 What's on your mind?
  </p>
</div>

<div style="width:500px; margin:0 auto; display:flex; gap:10px;">
  <input id="userInput" type="text" placeholder="Type here..." style="flex:1; padding:10px; border-radius:10px; border:none; font-family:'Poppins',sans-serif; font-size:14px;" onkeydown="if(event.key==='Enter') sendMessage()"/>
  <button onclick="sendMessage()" style="padding:10px 20px; background-color:#7F77DD; color:white; border:none; border-radius:10px; cursor:pointer; font-family:'Poppins',sans-serif;">Send</button>
</div>

<script>
var conversationHistory = [];

function addMessage(text, isUser) {
  var chatbox = document.getElementById('chatbox');
  var msg = document.createElement('p');
  msg.textContent = text;
  if (isUser) {
    msg.style.cssText = 'background-color:#444; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%; clear:both; float:right; margin:5px 0;';
  } else {
    msg.style.cssText = 'background-color:#7F77DD; padding:10px 15px; border-radius:15px; display:inline-block; max-width:80%; clear:both; float:left; margin:5px 0;';
  }
  chatbox.appendChild(msg);
  chatbox.scrollTop = chatbox.scrollHeight;
}

function sendMessage() {
  var input = document.getElementById('userInput');
  var userText = input.value.trim();
  if (!userText) return;

  addMessage(userText, true);
  input.value = '';

  conversationHistory.push({ role: 'user', content: userText });

  fetch('https://sage-proxy.anwitaghosh20.workers.dev', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [
        { role: 'system', content: 'You are Sage, a warm and supportive mental health companion for teenagers. You listen carefully, are never judgemental, and respond with empathy and care. Keep responses concise and supportive.' },
        ...conversationHistory
      ],
      max_tokens: 500
    })
  })
  .then(function(response) {
    return response.text();
  })
  .then(function(text) {
    try {
      var data = JSON.parse(text);
      if (data.choices && data.choices[0] && data.choices[0].message) {
        var reply = data.choices[0].message.content;
        conversationHistory.push({ role: 'assistant', content: reply });
        addMessage(reply, false);
      } else if (data.error) {
        addMessage('⚠️ Error: ' + JSON.stringify(data.error), false);
      } else {
        addMessage('⚠️ Unexpected response: ' + text.substring(0, 100), false);
      }
    } catch(e) {
      addMessage('⚠️ Parse error: ' + text.substring(0, 100), false);
    }
  })
  .catch(function(err) {
    addMessage('⚠️ Network error: ' + err.message, false);
  });
}
</script>

</body>
</html>
