<!DOCTYPE html>
      <html>
          <head>
              <title>Vent — MindSpace</title>
              <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
             <style>
        body {
        background-color:black;
        color:white;
        font-family: 'Poppins', sans-serif;
        text-align: center;
        padding: 50px;
      }  
                   textarea {
                  width: 600px;
                  height: 300px;
                 background-color: #1a1a2e;
                 color: white;
                  border: 2px solid #7F77DD;
                  border-radius: 15px;
                  padding: 20px;
                  font-size: 16px;
                  font-family: 'Poppins', sans-serif;
                  resize: none;
                   }

            
               
             .Enter {
             display: block;
            margin: 20px auto;
            background-color:white;
            color:black;
            padding:20px 60px;
            border:none;
            font-size:22px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            }


                  nav {
      background-color: #1a1a2e;
     padding: 15px;
      display: flex;
     gap: 20px;
     justify-content: center;
  }

nav a {
  color: white;
  text-decoration: none;
  font-size: 16px;
}
  
      
                  

                   
                         



     </style>
  </head>
  <body>
        

    <h1>💨 Need to vent?</h1>
    <h2>This is a safe space. Type everything out. Nothing is saved.</h2>
    <textarea placeholder="Start typing... let it all out."></textarea>
  <button class="letitgo">Let it go 🌬️</button>

<p id="message" style="display:none; font-size:24px; margin-top:30px;">
  🌬️ That took courage. You're lighter now.
</p>


<button id="mic" style="background-color:#7F77DD; border:none; color:white; padding:10px 20px; font-size:18px; border-radius:30px; cursor:pointer; font-family:'Poppins', sans-serif; margin-top:10px;">
  🎤 Talk instead
</button>


      
<nav>
<a href ="index.html">Home</a>
<a href="vent.html">Vent</a>
</nav>


        

      <script>
  document.querySelector('.letitgo').addEventListener('click', function() {
    const textarea = document.querySelector('textarea');
    
    if(textarea.value === '') {
      alert('Type something first!');
      return;
    }

    textarea.style.transition = 'opacity 1s ease, transform 1s ease';
    textarea.style.opacity = '0';
    textarea.style.transform = 'scale(0.8)';
    
setTimeout(function() {
  textarea.style.display = 'none';
  document.querySelector('.Enter').style.display = 'none';
  document.getElementById('message').style.display = 'block';
  }, 1000);

  });
</script>
 
<script>
  document.getElementById('mic').addEventListener('click', function() {
  var recognition = new webkitSpeechRecognition();
  recognition.lang = 'en-US';
  recognition.continuous = true; 

  document.getElementById('mic').textContent = '🔴 Listening...';

  recognition.onresult = function(event) {
    var text = '';
    for (var i = 0; i < event.results.length; i++) {
      text = text + event.results[i][0].transcript;
    }
    document.querySelector('textarea').value = text;
  };

  recognition.start();
});
   </script>
    

  </body>
</html>
