<!DOCTYPE html>
      <html>
          <head>
              <title>Vent — MindSpace</title>
              <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
             <style>
        body {
        background-color:black;
        color:white;
        font-family: 'Poppins', sans-serif;
        text-align: center;
        padding: 50px;
      }  
                   textarea {
                  width: 600px;
                  height: 300px;
                 background-color: #1a1a2e;
                 color: white;
                  border: 2px solid #7F77DD;
                  border-radius: 15px;
                  padding: 20px;
                  font-size: 16px;
                  font-family: 'Poppins', sans-serif;
                  resize: none;
                   }

            
               
             .letitgo {
             display: block;
            margin: 20px auto;
            background-color:white;
            color:black;
            padding:20px 60px;
            border:none;
            font-size:22px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            }

  
      <button id="reset" style="display:none;" class="letitgo" onclick="
  document.querySelector('textarea').style.display = 'block';
  document.querySelector('textarea').style.opacity = '1';
  document.querySelector('textarea').style.transform = 'scale(1)';
  document.querySelector('textarea').value = '';
  document.querySelector('.letitgo').style.display = 'block';
  document.getElementById('message').style.display = 'none';
  document.getElementById('reset').style.display = 'none';
">Try again 🌱</button>
                  

                   
                         



     </style>
  </head>
  <body>
        

    <h1>💨 Need to vent?</h1>
    <h2>This is a safe space. Type everything out. Nothing is saved.</h2>
    <textarea placeholder="Start typing... let it all out."></textarea>
  <button class="letitgo">Let it go 🌬️</button>

<p id="message" style="display:none; font-size:24px; margin-top:30px;">
  🌬️ That took courage. You're lighter now.
</p>

        <script>
  document.querySelector('.letitgo').addEventListener('click', function() {
    const textarea = document.querySelector('textarea');
    
    if(textarea.value === '') {
      alert('Type something first!');
      return;
    }

    textarea.style.transition = 'opacity 1s ease, transform 1s ease';
    textarea.style.opacity = '0';
    textarea.style.transform = 'scale(0.8)';
    
setTimeout(function() {
  textarea.style.display = 'none';
  document.querySelector('.letitgo').style.display = 'none';
  document.getElementById('message').style.display = 'block';
  document.getElementById('reset').style.display = 'block';
}, 1000);
      

              
</script>

    

  </body>
</html>
